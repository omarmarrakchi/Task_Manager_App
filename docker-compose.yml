version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: devops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpassword}
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskadmin} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: devops-task-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskadmin}:${POSTGRES_PASSWORD:-taskpassword}@postgres:5432/${POSTGRES_DB:-taskmanager}
      POSTGRES_SCHEMA: tasks_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: devops-user-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskadmin}:${POSTGRES_PASSWORD:-taskpassword}@postgres:5432/${POSTGRES_DB:-taskmanager}
      POSTGRES_SCHEMA: users_db
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_TASK_SERVICE_URL: ${REACT_APP_TASK_SERVICE_URL:-http://localhost:8000}
        REACT_APP_USER_SERVICE_URL: ${REACT_APP_USER_SERVICE_URL:-http://localhost:8001}
    container_name: devops-frontend
    ports:
      - "3000:80"
    depends_on:
      - task-service
      - user-service
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
